<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensageiro Privado</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <!-- Favicon inline para evitar 404 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>
  <div class="app">
    <div id="login-screen">
      <h2>🔐 Entrar</h2>
      <input type="text" id="username" placeholder="Nome anônimo" maxlength="15">
      <button id="connect-btn">Conectar</button>
      <div id="loading" style="display:none; margin-top:10px; color:#94a3b8; font-size:0.9rem;">⏳ Gerando chaves...</div>
    </div>
    <div id="chat-screen" class="hidden">
      <div id="chat-log"></div>
      <div class="input-area">
        <input type="text" id="target-user" placeholder="Nome do contato">
        <input type="text" id="message-input" placeholder="Mensagem...">
        <button id="send-btn">Enviar</button>
      </div>
      <button id="clear-btn" style="background:#334155; margin-top:8px; font-size:0.8rem;">🗑️ Limpar histórico</button>
    </div>
  </div>

  <!-- Scripts em módulo (carregam após o DOM) -->
  <script type="module" src="/crypto.js"></script>
  <script type="module" src="/localdb.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
