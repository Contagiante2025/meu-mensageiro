<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensageiro Privado- APLICAÇÃO EM ESTUDO: TESTE </title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <!-- Favicon inline para evitar 404 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>
  <div class="app">
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
      <h2> Entrar</h2>
      <input type="text" id="username" placeholder="Nome anônimo" maxlength="15">
      <button id="connect-btn">Conectar</button>
      
      <!-- Botão de Push (NOVO) -->
      <div style="margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px;">
        <button id="enable-push-btn" style="background: #059669; color: white; width: 100%; font-size: 0.9rem; border: none; padding: 10px; border-radius: 10px; cursor: pointer;">
          🔔 Ativar Notificações Push
        </button>

                <hr>
        <span style="background-color: yellow; color: #000000;">Atenção: O SERVIDOR NEM SEMPRE CARREGA ou é RÁPIDO PARA CARREGAR
          <br>- ESTE APP É APENAS UM PROTÓTIPO DE ESTUDO.</span>
      </div>

      <!-- Feedback de carregamento -->
      <div id="loading" style="display:none; margin-top:10px; color:#94a3b8; font-size:0.9rem;">⏳ Gerando chaves criptográficas...</div>
    </div>

    <!-- TELA DE CHAT -->
    <div id="chat-screen" class="hidden">
      <div id="chat-log"></div>
      <div class="input-area">
        <input type="text" id="target-user" placeholder="Nome do contato">
        <input type="text" id="message-input" placeholder="Mensagem...">
        <button id="send-btn">Enviar</button>
      </div>
      <button id="clear-btn" style="background:#334155; margin-top:8px; font-size:0.8rem;">🗑️ Limpar histórico</button>
    </div>
  </div>

  <!-- Scripts em módulo (ordem obrigatória) -->
  <script type="module" src="/crypto.js"></script>
  <script type="module" src="/localdb.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
